# Production self-hosting: app + database.
# You only need this file — no repository checkout required.
# 1. Download docker-compose.yml and .env.example (rename to .env)
# 2. Fill in .env, then: docker compose up -d
name: study-helper
services:
  app:
    # Prebuilt image from GitHub Container Registry.
    # Pin a version (e.g. :1.0.0) for reproducible deploys; :latest tracks releases.
    image: ghcr.io/veniplex/study-helper:${STUDYHELPER_VERSION:-latest}
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://study:${POSTGRES_PASSWORD:?set in .env}@db:5432/study
      APP_URL: ${APP_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set in .env}
      # Optional: seed demo accounts + content on first start (see .env.example)
      SEED_TEST_DATA: ${SEED_TEST_DATA:-false}
      # Server timezone — event times, reminders and daily plans use it.
      # Set to your users' timezone; containers default to UTC otherwise.
      TZ: ${TZ:-Europe/Berlin}
      # Staging directory for resumable (tus) uploads (see volume below).
      TUS_DIR: /data/tus-incoming
    volumes:
      - ${DATA_DIR:-./data}/uploads:/data/uploads
      # Staging area for resumable (tus) uploads of very large files. A
      # persistent volume lets an interrupted upload resume after a restart.
      - ${DATA_DIR:-./data}/tus-incoming:/data/tus-incoming
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # To move background jobs (embedding, summarization, coverage generation) off
    # the web tier, set WORKERS_IN_PROCESS: "false" here and run the worker
    # service below. By default (unset) the app runs workers in-process — no
    # extra service needed.
    #
    # To store uploaded files in S3 / S3-compatible object storage instead of the
    # local uploads volume (recommended for large multi-GB modules or multi-node
    # deployments), set STORAGE_DRIVER: "s3" and the S3_* / AWS_* vars below.
    # See docs/self-hosting.md → "Object storage (S3)".
    # environment:
    #   WORKERS_IN_PROCESS: "false"
    #   STORAGE_DRIVER: "s3"
    #   S3_BUCKET: "study-helper"
    #   S3_REGION: "eu-central-1"
    #   S3_ENDPOINT: "https://s3.example.com"   # only for S3-compatible services
    #   S3_FORCE_PATH_STYLE: "true"             # required by MinIO / some endpoints
    #   AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
    #   AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"

  # Optional dedicated job worker. Runs `npm run worker`, which uses tsx — so it
  # needs an image that includes the TS sources + devDependencies (a source
  # checkout, or a custom image built from the repo). The default prebuilt
  # standalone image runs jobs in-process instead, so this service is opt-in.
  # worker:
  #   image: ghcr.io/veniplex/study-helper:${STUDYHELPER_VERSION:-latest}
  #   command: ["npm", "run", "worker"]
  #   environment:
  #     DATABASE_URL: postgres://study:${POSTGRES_PASSWORD:?set in .env}@db:5432/study
  #     UPLOAD_DIR: /data/uploads
  #     # The worker finalizes resumable (tus) uploads, so it needs the staging dir.
  #     TUS_DIR: /data/tus-incoming
  #     TZ: ${TZ:-Europe/Berlin}
  #   volumes:
  #     - ${DATA_DIR:-./data}/uploads:/data/uploads
  #     - ${DATA_DIR:-./data}/tus-incoming:/data/tus-incoming
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   restart: unless-stopped

  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: study
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: study
    volumes:
      - ${DATA_DIR:-./data}/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study -d study"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
