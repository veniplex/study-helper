# Production self-hosting: app + database.
# You only need this file — no repository checkout required.
# 1. Download docker-compose.yml and .env.example (rename to .env)
# 2. Fill in .env, then: docker compose up -d
name: study-helper

# Without a limit Docker keeps json-file logs forever. A crash loop (e.g.
# pg-boss retrying against a dead database) can then fill the root partition
# and take the whole host down with it.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    # Prebuilt image from GitHub Container Registry.
    # Defaults to the current major version: patch and minor updates arrive via
    # `docker compose pull`, but a major release (which may apply irreversible
    # database migrations on first start) never lands unintentionally.
    # Pin a full version (e.g. :1.0.0) for fully reproducible deploys.
    image: ghcr.io/veniplex/study-helper:${STUDYHELPER_VERSION:-1}
    ports:
      # Bound to loopback: the documented setup terminates TLS in a reverse
      # proxy, and a published port would expose the app unencrypted next to it
      # — Docker's port publishing bypasses UFW rules, so the firewall would not
      # catch it. To reach the app directly from the LAN (no reverse proxy),
      # change this to "3000:3000" and firewall the port yourself.
      - "127.0.0.1:3000:3000"
    logging: *default-logging
    environment:
      DATABASE_URL: postgres://study:${POSTGRES_PASSWORD:?set in .env}@db:5432/study
      APP_URL: ${APP_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set in .env}
      # Optional: seed demo accounts + content on first start (see .env.example)
      SEED_TEST_DATA: ${SEED_TEST_DATA:-false}
      # Server timezone — event times, reminders and daily plans use it.
      # Set to your users' timezone; containers default to UTC otherwise.
      TZ: ${TZ:-Europe/Berlin}
      # Staging directory for resumable (tus) uploads (see volume below).
      TUS_DIR: /data/tus-incoming
    volumes:
      - ${DATA_DIR:-./data}/uploads:/data/uploads
      # Staging area for resumable (tus) uploads of very large files. A
      # persistent volume lets an interrupted upload resume after a restart.
      - ${DATA_DIR:-./data}/tus-incoming:/data/tus-incoming
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # restart: unless-stopped only reacts to a process exit — a server that is
      # up but wedged would keep serving errors forever. start_period is
      # generous because database migrations run before the first request.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    # Give in-process jobs time to finish on `docker stop`/redeploy. Docker's
    # 10s default would SIGKILL mid-job, leaving the job "active" in pg-boss
    # until its lease expires (up to an hour).
    stop_grace_period: 30s
    # Uploads, ZIP extraction and embedding run in-process by default, so a
    # single large module can balloon the app's memory. Without a limit the
    # kernel's OOM killer may pick the database container instead of the app.
    # Commented out because a sane value depends on your hardware — too tight a
    # limit gets the app killed outright mid-import rather than slowed down.
    # mem_limit: 2g
    # To move background jobs (embedding, summarization, coverage generation) off
    # the web tier, set WORKERS_IN_PROCESS: "false" here and run the worker
    # service below. By default (unset) the app runs workers in-process — no
    # extra service needed.
    #
    # To store uploaded files in S3 / S3-compatible object storage instead of the
    # local uploads volume (recommended for large multi-GB modules or multi-node
    # deployments), set STORAGE_DRIVER: "s3" and the S3_* / AWS_* vars below.
    # See docs/self-hosting.md → "Object storage (S3)".
    # environment:
    #   WORKERS_IN_PROCESS: "false"
    #   STORAGE_DRIVER: "s3"
    #   S3_BUCKET: "study-helper"
    #   S3_REGION: "eu-central-1"
    #   S3_ENDPOINT: "https://s3.example.com"   # only for S3-compatible services
    #   S3_FORCE_PATH_STYLE: "true"             # required by MinIO / some endpoints
    #   AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
    #   AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"

  # Optional dedicated job worker. Runs `npm run worker`, which uses tsx — so it
  # needs an image that includes the TS sources + devDependencies (a source
  # checkout, or a custom image built from the repo). The default prebuilt
  # standalone image runs jobs in-process instead, so this service is opt-in.
  # worker:
  #   image: ghcr.io/veniplex/study-helper:${STUDYHELPER_VERSION:-1}
  #   command: ["npm", "run", "worker"]
  #   environment:
  #     DATABASE_URL: postgres://study:${POSTGRES_PASSWORD:?set in .env}@db:5432/study
  #     UPLOAD_DIR: /data/uploads
  #     # The worker finalizes resumable (tus) uploads, so it needs the staging dir.
  #     TUS_DIR: /data/tus-incoming
  #     TZ: ${TZ:-Europe/Berlin}
  #   volumes:
  #     - ${DATA_DIR:-./data}/uploads:/data/uploads
  #     - ${DATA_DIR:-./data}/tus-incoming:/data/tus-incoming
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   restart: unless-stopped

  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: study
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: study
    volumes:
      - ${DATA_DIR:-./data}/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study -d study"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    logging: *default-logging
    # See the note on the app service. Postgres degrades gracefully under a
    # tight limit (it spills to disk), but sizing it too small still hurts
    # query performance, so pick a value that fits your host.
    # mem_limit: 1g
