<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        --fg: #171717;
        --muted: #737373;
        --bg: #ffffff;
        --border: #e5e5e5;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #fafafa;
          --muted: #a3a3a3;
          --bg: #0a0a0a;
          --border: #262626;
        }
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--fg);
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
      }
      main {
        text-align: center;
        padding: 2rem;
        max-width: 26rem;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.5rem;
      }
      p {
        color: var(--muted);
        font-size: 0.9rem;
        margin: 0 0 1.5rem;
      }
      button {
        border: 1px solid var(--border);
        background: transparent;
        color: var(--fg);
        border-radius: 0.5rem;
        padding: 0.5rem 1rem;
        font: inherit;
        font-size: 0.9rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Du bist offline · You’re offline</h1>
      <p>
        Diese Seite ist ohne Internetverbindung nicht verfügbar. · This page isn’t available without
        a connection.
      </p>
      <button onclick="location.reload()">Erneut versuchen · Retry</button>
    </main>
  </body>
</html>
