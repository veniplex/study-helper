name: Version Bump

# Bumps the app version and tags the release the moment a PR labeled
# "release-candidate" is merged into main, then explicitly triggers
# release.yml to build and publish the Docker image. No manual release
# step is needed — see docs/releasing.md.
#
# The label is opt-in: PRs are never auto-released unless someone adds
# "release-candidate" to them. Adding the label also triggers a Docker
# build validation before merge (see release-candidate.yml), so a broken
# Dockerfile is caught before the version is bumped and tagged, not after.
#
# Bump type is derived from the PR title (Conventional Commits):
#   - a "!" after the type, e.g. "feat!: ..." or "fix!: ..."  -> major
#   - "feat: ..." / "feat(scope): ..."                        -> minor
#   - anything else (fix, chore, docs, refactor, perf, ...)   -> patch
#
# Note: the commit + tag below are pushed using the default GITHUB_TOKEN.
# GitHub does not let GITHUB_TOKEN-authored pushes trigger other workflows'
# push events (anti-recursion protection), so release.yml would otherwise
# never run for these pushes — that's why the last step dispatches it
# explicitly via `gh workflow run`, which IS allowed from a GITHUB_TOKEN.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  actions: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump:
    if: >
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release-candidate') &&
      !startsWith(github.event.pull_request.title, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - name: Cancel now-redundant release-candidate build
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # The pre-merge Docker validation (release-candidate.yml) is moot
          # once this PR is merged: the build dispatched at the end of this
          # job validates AND publishes the real (version-bumped, multi-arch)
          # image. Cancel any validation run still in flight for this branch
          # so a labeled PR merged immediately doesn't build the image twice.
          ids=$(gh run list --repo "$REPO" --workflow=release-candidate.yml \
            --branch "$HEAD_REF" --json databaseId,status \
            --jq '.[] | select(.status=="in_progress" or .status=="queued") | .databaseId' || true)
          for id in $ids; do
            echo "Cancelling redundant release-candidate run $id"
            gh run cancel "$id" --repo "$REPO" || true
          done

      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine bump type
        id: bump
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          major_re='^[a-zA-Z]+(\([^)]*\))?!:'
          minor_re='^feat(\([^)]*\))?:'
          if [[ "$TITLE" =~ $major_re ]]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif [[ "$TITLE" =~ $minor_re ]]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): v${VERSION} (#${PR_NUMBER})"
          git tag "v${VERSION}"
          git push origin main
          git push origin "v${VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "${TITLE} (#${PR_NUMBER})"

      - name: Trigger Docker image build
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh workflow run release.yml --ref "v${VERSION}"
