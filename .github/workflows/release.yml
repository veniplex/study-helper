name: Release

# Builds and publishes the Docker image to GitHub Container Registry.
# - push to main        -> ghcr.io/<owner>/study-helper:main + :edge
# - push a v* git tag   -> :1.2.3, :1.2, :1, :latest (semver)
#
# workflow_dispatch exists so version-bump.yml can trigger this explicitly:
# GITHUB_TOKEN-authored pushes (which is how version-bump.yml pushes its
# release commit + tag) do not fire push-triggered workflow runs — GitHub
# suppresses that to prevent recursion — but an explicit workflow_dispatch
# call is exempt from that restriction.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # version-bump.yml pushes a "chore(release): vX.Y.Z" commit to main, then
    # immediately pushes the matching vX.Y.Z tag for that same commit — both
    # pushes would otherwise trigger a build of the same image. Skip the
    # main-branch build for that commit; the tag push builds it instead
    # (:edge briefly lags by that one version-bump commit until the next
    # regular push to main, which is harmless since it only touches package.json).
    if: github.ref_type == 'tag' || !startsWith(github.event.head_commit.message, 'chore(release):')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
