name: Release Candidate Check

# Validates that the Docker image builds for a PR marked ready to become a
# release — not for every PR. Add the "release-candidate" label once a PR
# is ready to ship; this then builds (but doesn't push) the image on every
# subsequent push while the label is present, so a broken Dockerfile
# surfaces before merge — before version-bump.yml bumps the version and
# tags the release, not after.

on:
  pull_request:
    types: [labeled, synchronize]

# One validation build per PR at a time: a new push cancels the previous
# (now-stale) build for the same PR. version-bump.yml additionally cancels
# whatever is still running here the moment the PR is merged, so a labeled
# PR merged immediately doesn't build the image both here and post-merge.
concurrency:
  group: release-candidate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Build-only validation — it never needs to write anything.
permissions:
  contents: read

jobs:
  docker-build:
    if: contains(github.event.pull_request.labels.*.name, 'release-candidate')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
